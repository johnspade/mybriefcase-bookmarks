<div class="detail-icon-wrap">
{% if favicon.is_empty() %}  <span class="favicon favicon-lg" :style="'background:' + '{{ domain_color }}'">{{ domain_letter }}</span>
{% else %}  <img class="favicon favicon-lg" src="/favicons/{{ favicon }}" alt="">
{% endif %}</div>
<div class="detail-title">{{ title }}</div>
<a class="detail-url" href="{{ url }}" target="_blank" rel="noopener">{{ url }}</a>
<div class="detail-tab-bar">
  <button type="button" class="btn btn-primary">Details</button>
  <button type="button" class="btn btn-ghost" hx-get="/bookmarks/{{ id }}/history" hx-target="#detail-body" hx-swap="innerHTML">History</button>
</div>
{% if !notes.is_empty() %}
<div class="detail-section">
  <div class="detail-section-label">Notes</div>
  <div class="detail-notes">{{ notes }}</div>
</div>
{% endif %}
<div class="detail-section">
  <div class="detail-section-label">Date added</div>
  <div class="detail-section-value">
    <time datetime="{{ created_at }}" data-format="long">{{ created_date }}</time>
  </div>
</div>
<div class="detail-section">
  <div class="detail-section-label">Last modified</div>
  <div class="detail-section-value">
    <time datetime="{{ updated_at }}" data-format="long">{{ updated_date }}</time>
  </div>
</div>
<div class="detail-actions">
  <button type="button" class="btn btn-primary"
          hx-get="/bookmarks/{{ id }}/edit-form" hx-target="#edit-modal-body" hx-swap="innerHTML"
          @click="$store.app.detailOpen = false">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit
  </button>
  <button type="button" class="btn btn-ghost" onclick="window.open('{{ url }}','_blank')">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Open
  </button>
  <button type="button" class="btn btn-ghost btn-danger" hx-post="/bookmarks/{{ id }}/remove" hx-target="#folder-content" hx-swap="innerHTML" hx-include="#current-folder-id" hx-confirm="Delete this bookmark?">Delete</button>
</div>
