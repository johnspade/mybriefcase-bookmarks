<h2>Edit Bookmark</h2>
<form hx-post="/bookmarks/{{ id }}/edit" hx-target="#detail-body" hx-swap="innerHTML"
      @htmx:after-request="if ($event.detail.pathInfo.requestPath === '/bookmarks/{{ id }}/edit') $store.app.showEditModal = false"
      x-init="htmx.process($el); $nextTick(() => $refs.editTitle.focus())">
  <div class="favicon-hero">
    <div id="favicon-preview">
{% match favicon %}{% when Some with (fav) %}      <div class="detail-icon-wrap"><img class="favicon favicon-xl" src="/favicons/{{ fav }}" alt=""></div>
{% when None %}      <div class="detail-icon-wrap"><span class="favicon favicon-xl" :style="'background:' + '{{ domain_color }}'">{{ domain_letter }}</span></div>
{% endmatch %}      <input type="hidden" name="favicon" value="{{ favicon.as_deref().unwrap_or_default() }}">
    </div>
    <div class="favicon-controls">
      <div class="favicon-buttons">
        <button type="button" class="btn btn-ghost btn-sm"
                hx-post="/bookmarks/{{ id }}/fetch-favicon"
                hx-target="#favicon-preview" hx-swap="outerHTML"
                hx-disabled-elt=".favicon-buttons button"
                hx-indicator="#favicon-spinner">
          <span id="favicon-spinner" class="htmx-indicator spinner-sm"></span>
          Refetch
        </button>
        <button type="button" class="btn btn-ghost btn-sm"
                x-show="$el.closest('form').querySelector('input[name=favicon]').value !== ''"
                @click="
                  let form = $el.closest('form');
                  form.querySelector('input[name=favicon]').value = '';
                  form.querySelector('#favicon-preview').innerHTML =
                    '<div class=&quot;detail-icon-wrap&quot;><span class=&quot;favicon favicon-xl&quot; :style=&quot;\'background:\' + \'{{ domain_color }}\'&quot;>{{ domain_letter }}</span></div><input type=&quot;hidden&quot; name=&quot;favicon&quot; value=&quot;&quot;>';
                ">
          Delete
        </button>
      </div>
    </div>
  </div>
  <div class="detail-field">
    <label>Name</label>
    <input type="text" name="title" value="{{ title }}" x-ref="editTitle">
  </div>
  <div class="detail-field">
    <label>URL</label>
    <input type="text" name="url" value="{{ url }}">
  </div>
  <div class="detail-field">
    <label>Notes</label>
    <textarea name="notes" rows="4">{{ notes }}</textarea>
  </div>
  <div class="detail-field">
    <label>Folder</label>
    <select name="folder_id">
      {% for folder in folders %}
      {% if folder.2 %}
      <option value="{{ folder.0 }}" selected>{{ folder.1 }}</option>
      {% else %}
      <option value="{{ folder.0 }}">{{ folder.1 }}</option>
      {% endif %}
      {% endfor %}
    </select>
  </div>
  <div class="modal-actions">
    <button type="button" class="btn btn-ghost" @click="$store.app.showEditModal = false">Cancel</button>
    <button type="submit" class="btn btn-primary">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
  </div>
</form>
