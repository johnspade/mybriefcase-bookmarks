<div class="detail-icon-wrap">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--folder-color)" stroke="none"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
</div>
<div class="detail-title">{{ title }}</div>
<div class="detail-meta">
  {{ bookmark_count }} bookmark{% if bookmark_count != 1 %}s{% endif %} · {{ item_count }} direct item{% if item_count != 1 %}s{% endif %}
</div>
<form hx-post="/folders/{{ id }}/rename" hx-target="#folder-content" hx-swap="innerHTML" hx-include="#current-folder-id">
  <div class="detail-field">
    <label>Folder name</label>
    <input type="text" name="title" value="{{ title }}">
  </div>
  <div class="detail-actions">
    <button type="submit" class="btn btn-primary">Save</button>
    <button type="button" class="btn btn-ghost" hx-get="/folders/{{ id }}" hx-target="#folder-content" hx-swap="innerHTML" hx-push-url="/folders/{{ id }}">Open</button>
    <button type="button" class="btn btn-ghost btn-danger" hx-post="/folders/{{ id }}/remove" hx-target="#folder-content" hx-swap="innerHTML" hx-include="#current-folder-id" hx-confirm="Delete this folder and its contents?">Delete</button>
  </div>
</form>
