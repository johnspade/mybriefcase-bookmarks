name: Mutation Testing

on:
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "crates/**"

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  mutants-baseline:
    name: "Nightly: baseline"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          source-url: https://github.com/johnspade/magic-nix-cache/releases/download/v0.1.6-fix172/magic-nix-cache.closure.xz
      - name: Run baseline
        run: nix develop --command cargo mutants --in-place --no-shuffle -vV --timeout 300 --shard 0/1 --baseline=run

  mutants-full:
    name: "Nightly: shard ${{ matrix.shard }}"
    runs-on: ubuntu-latest
    needs: [mutants-baseline]
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          source-url: https://github.com/johnspade/magic-nix-cache/releases/download/v0.1.6-fix172/magic-nix-cache.closure.xz
      - name: Run cargo-mutants (shard ${{ matrix.shard }}/8)
        run: nix develop --command cargo mutants --in-place --no-shuffle -vV --timeout 300 --baseline=skip --shard ${{ matrix.shard }}/8
      - name: Upload mutants.out
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: mutants-out-shard-${{ matrix.shard }}
          path: mutants.out/
          retention-days: 7

  mutants-pr:
    name: Mutation testing (PR diff)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          source-url: https://github.com/johnspade/magic-nix-cache/releases/download/v0.1.6-fix172/magic-nix-cache.closure.xz
      - name: Generate PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff
      - name: Run cargo-mutants on diff
        id: mutants
        run: |
          nix develop --command cargo mutants --in-diff pr.diff --in-place -vV --timeout 300 || true
      - name: Upload mutants.out
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: mutants-out-pr
          path: mutants.out/
          retention-days: 7
      - name: Report neutral status
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let description = 'Mutation testing completed';
            try {
              const outcomes = fs.readFileSync('mutants.out/outcomes.json', 'utf8');
              const data = JSON.parse(outcomes);
              const escaped = (data.outcomes || []).filter(o => o.scenario && o.scenario !== 'Baseline' && o.summary === 'MissedMutant').length;
              description = `${escaped} escaped mutant(s)`;
            } catch (e) {
              description = 'Mutation testing completed (no outcomes file)';
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'mutation-testing',
              description,
            });
