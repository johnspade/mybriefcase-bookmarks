name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: Conventional Commit (PR title)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  nix-checks:
    name: Nix checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          source-url: https://github.com/johnspade/magic-nix-cache/releases/download/v0.1.6-fix172/magic-nix-cache.closure.xz
      - run: nix flake check --keep-going
      - run: nix build .#default
      - name: Export closure for E2E
        run: |
          readlink result > store-path.txt
          nix-store --export $(nix-store -qR result) | zstd -T0 -3 > closure.nar.zst
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nix-closure
          path: |
            closure.nar.zst
            store-path.txt

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo +nightly miri test

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [nix-checks]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nix-closure
      - name: Import closure
        run: |
          zstd -d closure.nar.zst -o closure.nar
          nix-store --import < closure.nar
          STORE_PATH=$(cat store-path.txt)
          nix-store --realise "$STORE_PATH"
          ln -s "$STORE_PATH" result
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: e2e
        run: npm ci
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: e2e
        env:
          MBB_BINARY: ${{ github.workspace }}/result/bin/mybriefcase-bookmarks
        run: npx playwright test
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [miri, e2e]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
          source-url: https://github.com/johnspade/magic-nix-cache/releases/download/v0.1.6-fix172/magic-nix-cache.closure.xz
      - run: nix build .#docker
      - name: Smoke test
        run: |
          docker load < result
          docker run -d --name smoke-test -p 3000:3000 mybriefcase-bookmarks:latest
          timeout 30 sh -c 'until curl -sf http://localhost:3000/ | grep -q "MyBriefcase Bookmarks"; do sleep 1; done'
          docker stop smoke-test
      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          docker tag mybriefcase-bookmarks:latest "$REGISTRY/$IMAGE_NAME:${{ github.sha }}"
          docker tag mybriefcase-bookmarks:latest "$REGISTRY/$IMAGE_NAME:latest"
          docker push "$REGISTRY/$IMAGE_NAME:${{ github.sha }}"
          docker push "$REGISTRY/$IMAGE_NAME:latest"

  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Semantic Release
        id: semantic
        run: npx --yes semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check for new release tag
        id: check-tag
        run: |
          TAG=$(git tag --points-at HEAD | grep "^v" | head -n1)
          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Released $TAG"
          else
            echo "No new release"
          fi
      - name: Tag Docker image with release version
        if: steps.check-tag.outputs.tag != ''
        run: |
          VERSION="${{ steps.check-tag.outputs.tag }}"
          SEMVER="${VERSION#v}"
          MAJOR="$(echo "$SEMVER" | cut -d. -f1)"
          MINOR="$(echo "$SEMVER" | cut -d. -f1-2)"

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          docker pull "$REGISTRY/$IMAGE_NAME:${{ github.sha }}"

          for TAG in "$VERSION" "$SEMVER" "$MINOR" "$MAJOR"; do
            docker tag "$REGISTRY/$IMAGE_NAME:${{ github.sha }}" "$REGISTRY/$IMAGE_NAME:$TAG"
            docker push "$REGISTRY/$IMAGE_NAME:$TAG"
          done
