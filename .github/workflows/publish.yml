name: Publish Release

on:
  release:
    types: [published]

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Tag release image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
      - name: Pull, re-tag, and push
        run: |
          SHA="${{ github.event.release.target_commitish }}"
          VERSION="${{ github.event.release.tag_name }}"
          SEMVER="${VERSION#v}"
          MAJOR="$(echo "$SEMVER" | cut -d. -f1)"
          MINOR="$(echo "$SEMVER" | cut -d. -f1-2)"

          docker pull "$REGISTRY/$IMAGE_NAME:$SHA"

          for TAG in "$VERSION" "$SEMVER" "$MINOR" "$MAJOR"; do
            docker tag "$REGISTRY/$IMAGE_NAME:$SHA" "$REGISTRY/$IMAGE_NAME:$TAG"
            docker push "$REGISTRY/$IMAGE_NAME:$TAG"
          done
